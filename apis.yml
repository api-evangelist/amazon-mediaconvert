aid: amazon-mediaconvert
name: Amazon MediaConvert
description: >-
  AWS Elemental MediaConvert is a file-based video transcoding service that
  allows you to easily create video-on-demand (VOD) content for broadcast and
  multiscreen delivery at scale. It provides professional grade features and
  supports a wide range of video formats and codecs.
