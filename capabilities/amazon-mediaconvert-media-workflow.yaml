naftiko: 1.0.0-alpha1
info:
  label: Amazon MediaConvert Workflow
  description: Workflow capability for Amazon MediaConvert media processing operations for broadcast engineers and media developers.
  tags:
  - AWS
  - Media
  - Broadcasting
  - Workflow
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - import: mediaconvert
    location: ./shared/mediaconvert.yaml
  exposes:
  - type: rest
    port: 8080
    namespace: mediaconvert-workflow-api
    description: Unified REST API for Amazon MediaConvert workflow management.
    resources:
    - path: /v1/jobs
      name: jobs
      description: Manage media processing jobs
      operations:
      - method: GET
        name: list-jobs
        description: List jobs
        call: mediaconvert.list-jobs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: mediaconvert-workflow-mcp
    transport: http
    description: MCP server for AI-assisted Amazon MediaConvert workflow management.
    tools:
    - name: associate-certificate
      description: AssociateCertificate
      hints:
        readOnly: false
        openWorld: true
      call: mediaconvert.associate-certificate
      outputParameters:
      - type: object
        mapping: $.
    - name: get-job
      description: GetJob
      hints:
        readOnly: true
        openWorld: true
      call: mediaconvert.get-job
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-job
      description: CancelJob
      hints:
        readOnly: false
        openWorld: true
      call: mediaconvert.cancel-job
      outputParameters:
      - type: object
        mapping: $.
    - name: list-jobs
      description: ListJobs
      hints:
        readOnly: true
        openWorld: true
      call: mediaconvert.list-jobs
      outputParameters:
      - type: object
        mapping: $.
    - name: create-job
      description: CreateJob
      hints:
        readOnly: false
        openWorld: true
      call: mediaconvert.create-job
      outputParameters:
      - type: object
        mapping: $.
    - name: list-job-templates
      description: ListJobTemplates
      hints:
        readOnly: true
        openWorld: true
      call: mediaconvert.list-job-templates
      outputParameters:
      - type: object
        mapping: $.
    - name: create-job-template
      description: CreateJobTemplate
      hints:
        readOnly: false
        openWorld: true
      call: mediaconvert.create-job-template
      outputParameters:
      - type: object
        mapping: $.
    - name: list-presets
      description: ListPresets
      hints:
        readOnly: true
        openWorld: true
      call: mediaconvert.list-presets
      outputParameters:
      - type: object
        mapping: $.
