            them by name.
        - name: maxResults
          in: query
          type: integer
          required: false
          description: Optional. Number of presets, up to twenty, that will be returned at one time
        - name: nextToken
          in: query
          type: string
          required: false
          description: Use this string, provided with the response to a previous request, to request the next batch of presets.
        - name: order
          in: query
          type: string
          required: false
          description: Optional. When you request lists of resources, you can specify whether they are sorted in ASCENDING or DESCENDING order. Default varies by resource.
        - name: MaxResults
          in: query
          type: string
          required: false
          description: Pagination limit
        - name: NextToken
          in: query
          type: string
          required: false
          description: Pagination token
      - name: create-preset
        method: POST
        description: CreatePreset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: list-queues
        method: GET
        description: ListQueues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: listBy
          in: query
          type: string
          required: false
          description: Optional. When you request a list of queues, you can choose to list them alphabetically by NAME or chronologically by CREATION_DATE. If you don't specify, the service will list 
            them by creation date.
        - name: maxResults
          in: query
          type: integer
          required: false
          description: Optional. Number of queues, up to twenty, that will be returned at one time.
        - name: nextToken
          in: query
          type: string
          required: false
          description: Use this string, provided with the response to a previous request, to request the next batch of queues.
        - name: order
          in: query
          type: string
          required: false
          description: Optional. When you request lists of resources, you can specify whether they are sorted in ASCENDING or DESCENDING order. Default varies by resource.
        - name: MaxResults
          in: query
          type: string
          required: false
          description: Pagination limit
        - name: NextToken
          in: query
          type: string
          required: false
          description: Pagination token
      - name: create-queue
        method: POST
        description: CreateQueue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: get-job-template
        method: GET
        description: GetJobTemplate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: The name of the job template.
      - name: update-job-template
        method: PUT
        description: UpdateJobTemplate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: The name of the job template you are modifying
        body:
          type: json
          data: {}
      - name: delete-job-template
