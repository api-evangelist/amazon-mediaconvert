      outputParameters:
      - type: object
        mapping: $.
    - name: list-jobs
      description: ListJobs
      hints:
        readOnly: true
      call: mediaconvert.list-jobs
      outputParameters:
      - type: object
        mapping: $.
    - name: create-job
      description: CreateJob
      hints:
        readOnly: false
      call: mediaconvert.create-job
      outputParameters:
      - type: object
        mapping: $.
    - name: list-job-templates
