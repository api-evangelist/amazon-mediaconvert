naftiko: 1.0.0-alpha1
info:
  label: Amazon MediaConvert API
  description: AWS Elemental MediaConvert is a file-based video transcoding service that allows you to easily create video-on-demand (VOD) content for broadcast and multiscreen delivery at scale. It 
    supports broadcast-grade features including graphic overlays, content protection, multi-language audio, closed captioning, and a comprehensive range of video formats.
  tags:
  - AWS
  - Media
  - Broadcasting
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - type: http
    namespace: mediaconvert
    baseUri: http://mediaconvert.{region}.amazonaws.com
    description: Amazon MediaConvert REST API
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_ACCESS_KEY_ID}}'
      placement: header
    resources:
    - name: default
      path: /
      description: Amazon MediaConvert resources
      operations:
      - name: associate-certificate
        method: POST
        description: AssociateCertificate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: get-job
        method: GET
        description: GetJob
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: the job ID of the job.
      - name: cancel-job
        method: DELETE
        description: CancelJob
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The Job ID of the job to be cancelled.
      - name: list-jobs
        method: GET
        description: ListJobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxResults
          in: query
          type: integer
          required: false
          description: Optional. Number of jobs, up to twenty, that will be returned at one time.
        - name: nextToken
          in: query
          type: string
          required: false
          description: Optional. Use this string, provided with the response to a previous request, to request the next batch of jobs.
        - name: order
          in: query
          type: string
          required: false
          description: Optional. When you request lists of resources, you can specify whether they are sorted in ASCENDING or DESCENDING order. Default varies by resource.
        - name: queue
          in: query
          type: string
          required: false
          description: Optional. Provide a queue name to get back only jobs from that queue.
        - name: status
          in: query
          type: string
          required: false
          description: Optional. A job's status can be SUBMITTED, PROGRESSING, COMPLETE, CANCELED, or ERROR.
        - name: MaxResults
          in: query
          type: string
          required: false
          description: Pagination limit
        - name: NextToken
          in: query
          type: string
          required: false
          description: Pagination token
      - name: create-job
        method: POST
        description: CreateJob
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: list-job-templates
        method: GET
        description: ListJobTemplates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: category
          in: query
          type: string
          required: false
          description: Optionally, specify a job template category to limit responses to only job templates from that category.
        - name: listBy
          in: query
          type: string
          required: false
          description: Optional. When you request a list of job templates, you can choose to list them alphabetically by NAME or chronologically by CREATION_DATE. If you don't specify, the service 
            will list them by name.
        - name: maxResults
          in: query
          type: integer
          required: false
          description: Optional. Number of job templates, up to twenty, that will be returned at one time.
        - name: nextToken
          in: query
          type: string
          required: false
          description: Use this string, provided with the response to a previous request, to request the next batch of job templates.
        - name: order
          in: query
          type: string
          required: false
          description: Optional. When you request lists of resources, you can specify whether they are sorted in ASCENDING or DESCENDING order. Default varies by resource.
        - name: MaxResults
          in: query
          type: string
          required: false
          description: Pagination limit
        - name: NextToken
          in: query
          type: string
          required: false
          description: Pagination token
      - name: create-job-template
        method: POST
        description: CreateJobTemplate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: list-presets
        method: GET
        description: ListPresets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: category
          in: query
          type: string
          required: false
          description: Optionally, specify a preset category to limit responses to only presets from that category.
        - name: listBy
          in: query
          type: string
          required: false
