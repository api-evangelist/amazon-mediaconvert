          type: json
          data: {}
  exposes:
  - type: rest
    port: 8100
    namespace: mediaconvert-rest
    resources:
    - path: /v1/resources
      name: resources
      description: Amazon MediaConvert resources
      operations:
      - method: GET
        name: list-resources
        description: List Amazon MediaConvert resources
        call: mediaconvert.list
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9100
    namespace: mediaconvert-mcp
    transport: http
    tools:
    - name: associate-certificate
      description: AssociateCertificate
      hints:
        readOnly: false
      call: mediaconvert.associate-certificate
      outputParameters:
      - type: object
        mapping: $.
    - name: get-job
      description: GetJob
      hints:
