          in: path
          type: string
          required: true
          description: The name of the job template to be deleted.
      - name: get-policy
        method: GET
        description: GetPolicy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: put-policy
        method: PUT
        description: PutPolicy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: delete-policy
        method: DELETE
        description: DeletePolicy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-preset
        method: GET
        description: GetPreset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: The name of the preset.
      - name: update-preset
        method: PUT
        description: UpdatePreset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: The name of the preset you are modifying.
        body:
          type: json
          data: {}
      - name: delete-preset
        method: DELETE
        description: DeletePreset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: The name of the preset to be deleted.
      - name: get-queue
        method: GET
        description: GetQueue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
